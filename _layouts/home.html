{% include header.html %}

<link rel = "stylesheet" href = "/assets/css/theme.css">

<div class = "container">
    <div class = "posts">
        <h1>
            Recent posts
        </h1>
            
        
        {% for post in site.posts %}
            <a class = "snippet" href = "{{ post.url }}">
                <div class = "title">{{ post.title }}</div>
                <div class = "blurb">{{ post.blurb }}</div>
                <img src = "{{ post.img }}">
            </a>
        {% endfor %}
    </div>
</div>
    
{% include footer.html %}
